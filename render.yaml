# Render Blueprint — deploy backend + AI without a VPS.
#
# Setup:
#   1. Push this repo to GitHub
#   2. https://dashboard.render.com/blueprints → New Blueprint Instance
#   3. Connect the repo — Render reads this file automatically
#   4. Fill secret env vars when prompted (MONGODB_URI, GEMINI_API_KEY)
#   5. Deploy frontend separately on Vercel (see README → Deploy without a VPS)

services:
  # ── AI microservice ──────────────────────────────────────────────────
  - type: web
    name: dreamsignal-ai
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./ai-service/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: WHISPER_MODEL_SIZE
        value: base
      - key: USE_HF_WHISPER
        value: "true"
      - key: USE_HF_EMBEDDINGS
        value: "true"
      - key: PORT
        value: "8001"

  # ── Express API ──────────────────────────────────────────────────────
  - type: web
    name: dreamsignal-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDINARY_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_SECRET
        sync: false
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: dreamsignal-ai
          envVarKey: RENDER_EXTERNAL_URL
      - key: FRONTEND_URL
        sync: false
      - key: SENTRY_DSN
        sync: false