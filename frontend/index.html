<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DreamSignal — record, transcribe, and analyze your dreams. A private dossier of your subconscious." />
    <!--
      The PWA web app manifest (<link rel="manifest"> and theme-color
      meta) is injected automatically by vite-plugin-pwa at build time.
      We deliberately do NOT hand-roll those tags here, because in dev
      mode (devOptions.enabled = false) /manifest.webmanifest does not
      exist and the dev server would fall back to index.html, which the
      browser would then try to parse as JSON.
    -->
    <title>DreamSignal — Dream Dossier</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
