<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <style>
      .bg { fill: #1a1510; }
      .gold-dashed { fill: none; stroke: #b8860b; stroke-width: 8; stroke-dasharray: 20 12; }
      .gold-solid { fill: none; stroke: #b8860b; stroke-width: 2; opacity: 0.6; }
      .cream { fill: none; stroke: #f2ead8; stroke-width: 28; stroke-linecap: round; stroke-linejoin: round; }
      .cream-fill { fill: #f2ead8; }
      .red { fill: none; stroke: #8b1a1a; stroke-width: 24; stroke-linecap: round; }
      .red-fill { fill: #8b1a1a; }
    </style>
  </defs>

  <!-- Background squircle -->
  <rect width="512" height="512" rx="112" class="bg" />
  
  <!-- Dashed gold inner border -->
  <rect x="32" y="32" width="448" height="448" rx="80" class="gold-dashed" />
  <rect x="48" y="48" width="416" height="416" rx="64" class="gold-solid" />

  <!-- The Signal (Wifi-like waves emanating from the pupil) -->
  <path d="M 201 256 A 64 64 0 0 1 311 256" class="red" />
  <path d="M 159 232 A 112 112 0 0 1 353 232" class="red" />
  <path d="M 118 208 A 160 160 0 0 1 394 208" class="red" />
  <path d="M 77 184 A 208 208 0 0 1 435 184" class="red" />

  <!-- The Eye (Dream) - Drawn over the lower parts of the signal -->
  <!-- We use a thick stroke for the eyelid and a solid fill to mask the signal lines behind the eyeball -->
  <path d="M 80 288 Q 256 160 432 288 Q 256 416 80 288 Z" fill="#1a1510" class="cream" />
  
  <!-- The Iris -->
  <circle cx="256" cy="288" r="48" class="cream" />
  
  <!-- The Pupil / Signal Origin -->
  <circle cx="256" cy="288" r="16" class="red-fill" />
  
  <!-- Decorative crosshairs -->
  <line x1="256" y1="220" x2="256" y2="240" class="gold-solid" stroke-width="4" />
  <line x1="256" y1="336" x2="256" y2="356" class="gold-solid" stroke-width="4" />
  <line x1="188" y1="288" x2="208" y2="288" class="gold-solid" stroke-width="4" />
  <line x1="304" y1="288" x2="324" y2="288" class="gold-solid" stroke-width="4" />
</svg>