# DreamSignal — one-command local dev stack.
#
#   docker compose up --build
#
# Required env vars (put in a `.env` next to this file, see .env.example):
#   GEMINI_API_KEY        — get from https://aistudio.google.com/apikey
#   JWT_SECRET            — any 32+ char random string
# Optional:
#   HUGGINGFACE_API_KEY   — silences "unauthenticated requests" warning
#                           on HF model downloads
#   WHISPER_MODEL         — tiny | base (default) | small | medium

services:
  mongo:
    image: mongo:7
    container_name: dreamsignal-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backing store for the BullMQ dream-processing queue. The backend
  # silently falls back to inline processing if this service is absent,
  # so it's safe to comment out for a lightweight setup.
  redis:
    image: redis:7-alpine
    container_name: dreamsignal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    container_name: dreamsignal-ai
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL:-base}
      PORT: "8001"
    volumes:
      # Cache HF / Whisper model downloads between container restarts.
      - hf_cache:/root/.cache/huggingface
      - whisper_cache:/root/.cache/whisper
    ports:
      - "8001:8001"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dreamsignal-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_started
    environment:
      PORT: "5001"
      # The backend reads MONGODB_URI (matches backend/.env.example). The
      # older MONGO_URI alias used to be passed here; renaming both for
      # consistency with the rest of the codebase.
      MONGODB_URI: mongodb://mongo:27017/dreamsignal
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-please_set_a_real_secret_in_dot_env}
      AI_SERVICE_URL: http://ai-service:8001
      FRONTEND_URL: http://localhost:5173
      # Optional: paste a Sentry DSN here to forward unhandled errors.
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    volumes:
      - ./storage:/app/storage
    ports:
      - "5001:5001"

  # Periodic orphan-file pruner. Reuses the backend image (which already
  # has Mongoose, the Dream model, and scripts/ baked in) and just swaps
  # the entrypoint. Runs the dry-run by default if CLEANUP_DRY_RUN=true.
  cleanup:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dreamsignal-cleanup
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongo:27017/dreamsignal
      CLEANUP_INTERVAL_HOURS: ${CLEANUP_INTERVAL_HOURS:-24}
      CLEANUP_MAX_AGE_DAYS: ${CLEANUP_MAX_AGE_DAYS:-7}
      CLEANUP_DRY_RUN: ${CLEANUP_DRY_RUN:-false}
    volumes:
      - ./storage:/app/storage
    working_dir: /app
    command: ["node", "scripts/cleanup_cron.js"]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: dreamsignal-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:5001/api
    ports:
      - "5173:5173"

volumes:
  mongo_data:
  redis_data:
  hf_cache:
  whisper_cache:
